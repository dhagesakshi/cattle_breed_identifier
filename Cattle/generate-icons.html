<!DOCTYPE html>
<html>
<head>
    <title>Generate Extension Icons</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 800px;
            margin: 0 auto;
        }
        canvas { 
            border: 1px solid #ccc; 
            margin: 10px;
            display: block;
        }
        button { 
            padding: 10px 20px; 
            margin: 5px; 
            cursor: pointer;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }
        button:hover {
            background: #0284c7;
        }
        .icon-container {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        h1 {
            color: #0ea5e9;
        }
    </style>
</head>
<body>
    <h1>🐄 Extension Icon Generator</h1>
    <p>Click the buttons below to download icons. Save them in the <code>public/icons/</code> folder, then rebuild your extension.</p>
    
    <div id="canvases"></div>
    
    <script>
        const sizes = [16, 48, 128];
        const container = document.getElementById('canvases');
        
        sizes.forEach(size => {
            const iconDiv = document.createElement('div');
            iconDiv.className = 'icon-container';
            
            const title = document.createElement('h3');
            title.textContent = `icon${size}.png (${size}x${size} pixels)`;
            iconDiv.appendChild(title);
            
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = (size * 3) + 'px';
            canvas.style.height = (size * 3) + 'px';
            canvas.style.imageRendering = 'pixelated';
            
            const ctx = canvas.getContext('2d');
            
            // Draw icon with gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#0ea5e9');
            gradient.addColorStop(1, '#0284c7');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Add border
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = Math.max(1, size / 32);
            ctx.strokeRect(0, 0, size, size);
            
            // Draw text
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold ' + Math.floor(size * 0.5) + 'px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('CC', size/2, size/2);
            
            iconDiv.appendChild(canvas);
            
            const button = document.createElement('button');
            button.textContent = `Download icon${size}.png`;
            button.onclick = () => {
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `icon${size}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 'image/png');
            };
            iconDiv.appendChild(button);
            
            container.appendChild(iconDiv);
        });
        
        // Add instructions
        const instructions = document.createElement('div');
        instructions.style.marginTop = '30px';
        instructions.style.padding = '15px';
        instructions.style.background = '#e0f2fe';
        instructions.style.borderRadius = '8px';
        instructions.innerHTML = `
            <h3>Instructions:</h3>
            <ol>
                <li>Click each "Download" button above</li>
                <li>Save all three files to: <code>public/icons/</code> folder in your project</li>
                <li>Run <code>npm run build</code> again</li>
                <li>Update manifest.json to include icons (optional - extension works without them)</li>
            </ol>
        `;
        container.appendChild(instructions);
    </script>
</body>
</html>
